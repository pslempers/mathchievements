<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
        <title>Mathchievements</title>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.3/jquery.min.js"></script>
        <script src="script.js" type="module"></script>
        <link rel="stylesheet" href="styles.css">
        <link rel="icon" type="image/png" href="images/mathchievements-favicon.ico">
    </head>
    <body>
        <h1>Mathchievements</h1>
        <section class="sets">
            <div class="set" id="addSet">add</div>
            <div class="set" id="subSet">sub</div>
            <div class="set" id="mltSet">mlt</div>
            <div class="set" id="divSet">div</div>
        </section>
        <main>

            <form action="/" id="qForm" method="post">
                <div class="introMsg">
                    <h2>Welcome!</h2>
                </div>
                <div class="mainZone equation">
                    <div class="num num1"></div>
                    <div class="operator"></div>
                    <div class="num num2"></div>
                </div>
                <button class="mainZone"  id="startBtn">
                    <h2>Start</h2>
                </button>
                <input type="submit" class="mainZone" id="equals" value="equals" style="display:none"></input>
                <input type="number" inputmode="decimal" placeholder="0" class="mainZone scroller" id="userInput" step="any"></input>
            </form>
        </main>
        <section class="achievements">
            achievement zone
        </section>
        <div class="numPad">
            <button class="numKey" id="numKey1" value="1">1</button>
            <button class="numKey" id="numKey2" value="2">2</button>
            <button class="numKey" id="numKey3" value="3">3</button>
            <button class="numKey" id="numKey4" value="4">4</button>
            <button class="numKey" id="numKey5" value="5">5</button>
            <button class="numKey" id="numKey6" value="6">6</button>
            <button class="numKey" id="numKey7" value="7">7</button>
            <button class="numKey" id="numKey8" value="8">8</button>
            <button class="numKey" id="numKey9" value="9">9</button>
            <button class="numKey" id="numKey-" value="-">-</button>
            <button class="numKey" id="numKey0" value="0">0</button>
            <button class="numKey" id="numKey" value="NEW">NEW</button>
            <button class="numKey" id="numKeyENT" value="ENT">ENT</button>
            <button class="numKey" id="numKeyC" value="C">C</button>
        </div>
    </body>
</html>
